name: Render Reel Video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Prepare paths
        run: |
          mkdir -p output tmp

      - name: Run script
        run: |
          chmod +x script.sh
          ./script.sh

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output/
